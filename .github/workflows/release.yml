name: Build and Release Extension Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build extension zip
        run: bash scripts/package-extension.sh

      - name: Locate zip file
        id: zip
        run: |
          ZIP_PATH=$(ls releases/traderx-pro-v*.zip | head -n 1)
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          ## Installation

          1. Download the attached zip file from this release.
          2. Extract the zip to a folder on your computer.
          3. Open chrome://extensions/ in Chrome, Brave, Arc, Edge, or Opera.
          4. Enable **Developer mode**.
          5. Click **Load unpacked**.
          6. Select the extracted extension folder.
          7. Open X/Twitter and TraderX Pro will activate.

          ## Included Asset

          - Attached release zip: traderx-pro-${TAG_NAME}.zip

          ## Notes

          - This repository contains only the browser extension code.
          - If Chrome blocks loading from the extracted folder, re-extract the zip into a normal writable directory like Downloads or Desktop.
          - For source code and documentation, visit: https://github.com/bhrigu-verma/traderx-extension
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_path }}
          body_path: release-notes.md