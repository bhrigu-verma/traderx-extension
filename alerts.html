<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TraderX Pro — Alert History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #06080E;
            --bg-card: #0D1117;
            --bg-elevated: #151B25;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --accent: #6366F1;
            --accent-bright: #818CF8;
            --accent-glow: rgba(99, 102, 241, 0.12);
            --emerald: #10B981;
            --amber: #F59E0B;
            --red: #EF4444;
            --text-primary: #F1F5F9;
            --text-secondary: rgba(241, 245, 249, 0.6);
            --text-muted: rgba(241, 245, 249, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 32px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .page-header {
            margin-bottom: 32px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .page-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #8B5CF6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .page-title-group h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .page-title-group h1 span {
            background: linear-gradient(135deg, var(--accent-bright) 0%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-wrapper::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px 12px 38px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23666'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, #7C3AED 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Alert List */
        .alert-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .alert-item {
            display: flex;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            align-items: flex-start;
            gap: 14px;
            transition: background 0.15s;
        }

        .alert-item:hover {
            background: var(--bg-elevated);
        }

        .alert-item:last-child {
            border-bottom: none;
        }

        .alert-type {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 0.04em;
            color: white;
        }

        .alert-type.fda { background: linear-gradient(135deg, #10B981, #059669); }
        .alert-type.earnings { background: linear-gradient(135deg, #6366F1, #4F46E5); }
        .alert-type.halts { background: linear-gradient(135deg, #EF4444, #DC2626); }
        .alert-type.mergers { background: linear-gradient(135deg, #8B5CF6, #7C3AED); }
        .alert-type.short, .alert-type.shortreport { background: linear-gradient(135deg, #F59E0B, #D97706); }
        .alert-type.default { background: linear-gradient(135deg, #6B7280, #4B5563); }

        .alert-content { flex: 1; min-width: 0; }

        .alert-text {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .alert-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alert-meta a {
            color: var(--accent-bright);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .alert-meta a:hover { color: #C084FC; }

        .alert-time {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 32px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13px;
            max-width: 360px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 6px; }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.4s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header fade-in">
            <div class="page-header-left">
                <div class="page-icon">🔔</div>
                <div class="page-title-group">
                    <h1>Alert <span>History</span></h1>
                    <p class="page-subtitle">All triggered keyword alerts</p>
                </div>
            </div>
        </div>

        <div class="toolbar fade-in" style="animation-delay: 0.05s;">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Search alerts...">
            </div>
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="FDA">FDA</option>
                <option value="Earnings">Earnings</option>
                <option value="Halts">Halts</option>
                <option value="Mergers">Mergers</option>
                <option value="Short Report">Short Report</option>
            </select>
            <button class="btn btn-accent" id="export-btn">📤 Export CSV</button>
            <button class="btn btn-danger" id="clear-btn">🗑️ Clear All</button>
        </div>

        <div class="alert-list fade-in" style="animation-delay: 0.1s;" id="alert-list">
            <div class="empty-state">
                <div class="empty-icon">🔕</div>
                <h2>No alerts yet</h2>
                <p>Alerts will appear here when keyword rules are triggered on your feed.</p>
            </div>
        </div>
    </div>

    <script>
        let alerts = [];

        async function loadAlerts() {
            const response = await chrome.runtime.sendMessage({ action: 'getAlertHistory' });
            alerts = response.history || [];
            renderAlerts();
        }

        function renderAlerts() {
            const container = document.getElementById('alert-list');
            const search = document.getElementById('search').value.toLowerCase();
            const typeFilter = document.getElementById('filter-type').value;

            const filtered = alerts.filter(a => {
                if (search && !a.text.toLowerCase().includes(search) && !a.author.toLowerCase().includes(search)) return false;
                if (typeFilter && a.name !== typeFilter) return false;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">${alerts.length > 0 ? '🔍' : '🔕'}</div>
                        <h2>${alerts.length > 0 ? 'No matching alerts' : 'No alerts yet'}</h2>
                        <p>${alerts.length > 0 ? 'Try adjusting your search or filters.' : 'Alerts will appear here when keyword rules are triggered on your feed.'}</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map((alert, i) => {
                const typeClass = alert.name.toLowerCase().replace(/\s+/g, '');
                const time = new Date(alert.timestamp).toLocaleString();
                return `
                    <div class="alert-item" style="animation: fadeIn 0.3s ease-out ${i * 0.03}s both;">
                        <span class="alert-type ${typeClass}">${alert.name}</span>
                        <div class="alert-content">
                            <div class="alert-text">${alert.text}</div>
                            <div class="alert-meta">
                                <a href="https://x.com/${alert.author}" target="_blank">@${alert.author}</a>
                                ${alert.tickers?.length ? ' · ' + alert.tickers.map(t => '<strong>$' + t + '</strong>').join(', ') : ''}
                            </div>
                        </div>
                        <span class="alert-time">${time}</span>
                    </div>`;
            }).join('');
        }

        function exportCSV() {
            const csv = [
                ['Time', 'Type', 'Author', 'Tickers', 'Text'].join(','),
                ...alerts.map(a => [
                    a.timestamp, a.name, a.author,
                    (a.tickers || []).join(' '),
                    '"' + a.text.replace(/"/g, '""') + '"'
                ].join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'traderx-alerts.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function clearAlerts() {
            if (confirm('Clear all alert history? This cannot be undone.')) {
                await chrome.runtime.sendMessage({ action: 'clearAlertHistory' });
                alerts = [];
                renderAlerts();
            }
        }

        document.getElementById('search').addEventListener('input', renderAlerts);
        document.getElementById('filter-type').addEventListener('change', renderAlerts);
        document.getElementById('export-btn').addEventListener('click', exportCSV);
        document.getElementById('clear-btn').addEventListener('click', clearAlerts);

        loadAlerts();
    </script>
</body>

</html>
